    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        img {
            max-width: 480px;
            width: 90%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .btn {
            margin-top: 24px;
            background: #2a7d6f;
            color: white;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #1f5f54; }
        .redirect-msg {
            margin-top: 12px;

            color: #888;
        }

<body>

    <img src="convite.png" alt="Convite Bilastina na Pediatria" />
    <a class="btn" href="https://evento-alektos-ped.lovable.app">Acessar o Evento →</a>
    <p class="redirect-msg">Redirecionando em <span id="count">5</span> segundos...</p>

    <script>
        let n = 5;
        const el = document.getElementById('count');
        const timer = setInterval(() => {
            n--;
            el.textContent = n;
            if (n <= 0) {
                clearInterval(timer);
                window.location.href = 'https://evento-alektos-ped.lovable.app';
            }
        }, 1000);
    </script>
